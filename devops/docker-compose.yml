# CMU Mini-5 DevOps — Jenkins + SonarQube stack
# Created: 2026-06-20
# Network: petclinic-devops-net (bridge, external — created manually first)

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: petclinic-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=true
    networks:
      - petclinic-devops-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/login || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  sonarqube-db:
    image: postgres:15-alpine
    container_name: petclinic-sonarqube-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    networks:
      - petclinic-devops-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonarqube"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:lts-community
    container_name: petclinic-sonarqube
    restart: unless-stopped
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "9000:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - petclinic-devops-net
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9000 && printf \"GET /api/system/status HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"\\\"status\\\":\\\"UP\\\"\"'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
  
  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: petclinic-zap
    restart: "no"
    networks:
      - petclinic-devops-net
    volumes:
      - ./reports/zap:/zap/wrk

networks:
  petclinic-devops-net:
    external: true
    name: petclinic-devops-net

volumes:
  jenkins_home:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
